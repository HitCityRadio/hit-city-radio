<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit City Radio | Nairobi</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="./script.js" defer></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo-icon"><span class="big-c">C</span><span class="inner-h">H</span></div>
            <span class="radio-text">radio</span>
        </div>
        <nav class="genre-nav">
            <button class="nav-btn active" onclick="filterGenre('All', this)">ALL</button>
            <button class="nav-btn" onclick="filterGenre('Drill', this)">DRILL</button>
            <button class="nav-btn" onclick="filterGenre('Arbantone', this)">ARBANTONE</button>
            <button class="nav-btn" onclick="filterGenre('Soul', this)">SOUL</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Top 10 Street Heat</h1>
            <p>Nairobi's underground charts live.</p>
        </section>
        
        <div id="chartList" class="chart-wrapper">
            <p style="text-align:center; color:#444;">Loading Nairobi's Finest...</p>
        </div>

        <section class="submit-section">
            <p>Know a hit we missed?</p>
            <button class="submit-btn" onclick="window.location.href='mailto:hitcityradio@gmail.com'">SUBMIT A TRACK</button>
        </section>
    </main>

    <audio id="mainPlayer" preload="none" crossorigin="anonymous"></audio>

    <footer id="player-bar">
        <div class="np-info">
            <div class="pulse-icon"></div>
            <div class="text-group">
                <span class="label">STATUS:</span>
                <span id="trackTitle">MORCAST STANDBY</span>
            </div>
        </div>
        <button class="listen-btn" id="playPauseBtn">LISTEN LIVE</button>
    </footer>
</body>
</html>
