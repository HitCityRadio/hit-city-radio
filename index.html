<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit City Radio | Kenya Underground Top 50</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-main">
                <span class="c-symbol">C</span><span class="h-symbol">H</span>
            </div>
            <span class="radio-text">radio</span>
        </div>
        <div class="header-tag">The Streets Choose the Hits 🏙️</div>
    </header>

    <main>
        <section class="hero">
            <h1>Top 50 Underground</h1>
            <p>Scouted by the community. Ranked by you.</p>
        </section>

        <div class="chart-wrapper" id="chartList">
            </div>
    </main>

    <footer id="player-bar">
        <div class="np-info">
            <span class="label">LIVE:</span>
            <span id="trackTitle">Loading the next hit...</span>
        </div>
        <button class="listen-btn">LISTEN LIVE</button>
        <audio id="radioStream" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    </footer>

    <script src="script.js"></script>
</body>
</html>
