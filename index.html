<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit City Radio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Hit City Radio</h1>
        <button id="toggle-theme">Toggle Dark/Light Mode</button>
    </header>
    <main>
        <div id="audio-player">
            <audio controls>
                <source src="your-audio-file.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <input type="range" id="volume-control" min="0" max="1" step="0.1" value="0.5">
        </div>
        <div id="real-time-chat">
            <h2>Chat</h2>
            <ul id="messages"></ul>
            <input id="message-input" type="text">
            <button id="send-button">Send</button>
        </div>
        <div id="song-queue">
            <h2>Song Queue</h2>
            <ul id="queue-list"></ul>
        </div>
    </main>
    <footer>
        <p>Hit City Radio &copy; 2026</p>
    </footer>
    <script>
        // Configuration constants
        const VOLUME_DEFAULT = 0.5;

        // Error handling utility
        function handleError(error) {
            console.error('An error occurred:', error);
        }

        // Initialize the audio player
        const audioPlayer = document.querySelector('audio');
        audioPlayer.volume = VOLUME_DEFAULT;

        // Volume control
        document.getElementById('volume-control').addEventListener('input', function() {
            audioPlayer.volume = this.value;
        });

        // Sample chat implementation
        document.getElementById('send-button').addEventListener('click', function() {
            const messageInput = document.getElementById('message-input');
            if (messageInput.value) {
                const messageElement = document.createElement('li');
                messageElement.textContent = messageInput.value;
                document.getElementById('messages').appendChild(messageElement);
                messageInput.value = '';
            }
        });

        // Dark/light mode toggle
        document.getElementById('toggle-theme').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
