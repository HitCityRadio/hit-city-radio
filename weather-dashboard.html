<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Weather Dashboard</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>Weather Dashboard</h1>\n        <button id="theme-toggle">Toggle Theme</button>\n    </header>\n    <main>\n        <section id="current-weather">\n            <h2>Current Weather</h2>\n            <div id="current-weather-display">\n                <p>Location: <span id="location"></span></p>\n                <p>Temperature: <span id="temperature"></span> °C</p>\n                <p>Conditions: <span id="conditions"></span></p>\n            </div>\n        </section>\n        <section id="hourly-forecast">\n            <h2>Hourly Forecast</h2>\n            <div id="hourly-forecast-display"></div>\n        </section>\n        <section id="weekly-forecast">\n            <h2>7-Day Forecast</h2>\n            <div id="weekly-forecast-display"></div>\n        </section>\n        <section id="weather-statistics">\n            <h2>Weather Statistics</h2>\n            <div id="statistics-display"></div>\n        </section>\n        <section id="saved-locations">\n            <h2>Saved Locations</h2>\n            <div id="saved-locations-display"></div>\n            <input type="text" id="search-location" placeholder="Search location...">\n            <button id="search-button">Search</button>\n        </section>\n    </main>\n    <script src="script.js"></script>\n</body>\n</html>\n
