name: Deploy Hit City Radio
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6 # Updated for Node 24 support

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v5

      - name: Upload Artifact 📦
        uses: actions/upload-pages-artifact@v3 # Using the latest stable for Pages

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v5 # Updated for Node 24 support
